name: Daily Short

on:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 17 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create output dir
        run: mkdir -p output

      - name: Auth with YouTube
        env:
          CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          echo "$CLIENT_SECRET_JSON" > client_secret.json
          echo "$YOUTUBE_TOKEN_JSON" > youtube_token.json

      - name: Restore used topics
        run: git show origin/main:used_topics.json > used_topics.json 2>/dev/null || echo "[]" > used_topics.json

      - name: Run agent
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          VIDEO_PRIVACY: "public"
          VIDEO_FONT: "DejaVuSans"
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python src/agent.py

      - name: Save used topics
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f used_topics.json music_blacklist.json
          git diff --cached --quiet || git commit -m "Update used topics [skip ci]"
          git remote set-url origin https://${GH_TOKEN}@github.com/alexgoulart007/curiosity-shorts-agent.git
          git push

      - name: Persistir token renovado
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "⚠️ GH_PAT nao configurado - token NAO foi persistido"
            echo "Para ativar: https://github.com/settings/tokens (crie PAT com repo scope)"
            echo "Depois adicione em: https://github.com/alexgoulart007/curiosity-shorts-agent/settings/secrets/actions (GH_PAT)"
            exit 0
          fi
          gh secret set YOUTUBE_TOKEN --repo ${{ github.repository }} --body "$(cat youtube_token.json)"
          echo "✅ Token renovado salvo no Secret do GitHub"